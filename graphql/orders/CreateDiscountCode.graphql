mutation CreateDiscountCode(
  $title: String!
  $code: String!
  $startsAt: DateTime!
  $endsAt: DateTime
  $percentage: Float
  $appliesOncePerCustomer: Boolean = true
) {
  discountCodeBasicCreate(
    basicCodeDiscount: {
      title: $title
      code: $code
      startsAt: $startsAt
      endsAt: $endsAt
      customerGets: {
        value: {
          percentage: $percentage
        }
        items: {
          all: true
        }
      }
      appliesOncePerCustomer: $appliesOncePerCustomer
      customerSelection: {
        all: true
      }
    }
  ) {
    codeDiscountNode {
      id
      codeDiscount {
        ... on DiscountCodeBasic {
          title
          codes(first: 1) {
            edges {
              node {
                code
              }
            }
            pageInfo {
              hasNextPage
              endCursor
            }
          }
          startsAt
          endsAt
          status
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
