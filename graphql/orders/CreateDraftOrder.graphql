mutation CreateDraftOrder(
  $lineItems: [DraftOrderLineItemInput!]!
  $customerId: ID
  $email: String
  $note: String
  $tags: [String!]
  $shippingAddress: MailingAddressInput
  $useCustomerDefaultAddress: Boolean = false
) {
  draftOrderCreate(
    input: {
      lineItems: $lineItems
      purchasingEntity: { customerId: $customerId }
      email: $email
      note: $note
      tags: $tags
      shippingAddress: $shippingAddress
      useCustomerDefaultAddress: $useCustomerDefaultAddress
    }
  ) {
    draftOrder {
      id
      name
      invoiceUrl
      status
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      lineItems(first: 50) {
        edges {
          node {
            title
            quantity
            originalTotalSet {
              shopMoney {
                amount
                currencyCode
              }
            }
          }
        }
      }
      customer {
        id
        firstName
        lastName
        defaultEmailAddress {
          emailAddress
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
