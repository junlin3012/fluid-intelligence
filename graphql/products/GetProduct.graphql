query GetProduct($id: ID!) {
  product(id: $id) {
    id
    title
    handle
    descriptionHtml
    status
    vendor
    productType
    tags
    totalInventory
    createdAt
    updatedAt
    variants(first: 50) {
      edges {
        node {
          id
          title
          sku
          priceV2 {
            amount
            currencyCode
          }
          inventoryQuantity
        }
        cursor
      }
      pageInfo {
        hasNextPage
      }
    }
  }
}
