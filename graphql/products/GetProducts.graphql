query GetProducts($first: Int = 10, $query: String) {
  products(first: $first, query: $query) {
    edges {
      node {
        id
        title
        handle
        status
        vendor
        productType
        tags
        totalInventory
        createdAt
        updatedAt
        featuredMedia {
          preview {
            image {
              url
              altText
            }
          }
        }
        variants(first: 10) {
          edges {
            node {
              id
              title
              sku
              price
              inventoryQuantity
            }
          }
          pageInfo {
            hasNextPage
          }
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
    }
  }
}
