mutation CreateProduct(
  $title: String!
  $descriptionHtml: String
  $productType: String
  $vendor: String
  $status: ProductStatus = DRAFT
  $tags: [String!]
  $variants: [ProductVariantSetInput!]
) {
  productSet(
    synchronous: true
    input: {
      title: $title
      descriptionHtml: $descriptionHtml
      productType: $productType
      vendor: $vendor
      status: $status
      tags: $tags
      variants: $variants
    }
  ) {
    product {
      id
      title
      handle
      status
      productType
      vendor
      tags
      variants(first: 10) {
        edges {
          node {
            id
            title
            sku
            price
          }
        }
        pageInfo {
          hasNextPage
          endCursor
        }
      }
      createdAt
    }
    userErrors {
      field
      message
    }
  }
}
