query GetCustomers($first: Int = 10, $after: String, $query: String) {
  customers(first: $first, after: $after, query: $query) {
    edges {
      node {
        id
        firstName
        lastName
        displayName
        email
        phone
        amountSpent {
          amount
          currencyCode
        }
        createdAt
        updatedAt
        tags
      }
      cursor
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
