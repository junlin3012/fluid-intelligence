query GetCustomers($first: Int = 10, $query: String) {
  customers(first: $first, query: $query) {
    edges {
      node {
        id
        firstName
        lastName
        displayName
        email
        phone
        amountSpent {
          amount
          currencyCode
        }
        createdAt
        updatedAt
        tags
      }
      cursor
    }
    pageInfo {
      hasNextPage
    }
  }
}
