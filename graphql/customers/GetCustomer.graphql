query GetCustomer($id: ID!) {
  customer(id: $id) {
    id
    firstName
    lastName
    displayName
    email
    phone
    locale
    note
    tags
    numberOfOrders
    amountSpent {
      amount
      currencyCode
    }
    createdAt
    updatedAt
    defaultAddress {
      id
      firstName
      lastName
      address1
      city
      province
      country
      zip
    }
    # Note: customer.orders connection removed in Shopify API 2026-01
    # Use root orders query with filter: query: "customer_id:<id>"
  }
}
