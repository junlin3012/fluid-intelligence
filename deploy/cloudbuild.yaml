steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'deploy/Dockerfile', '-t', '${_IMAGE}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fluid-intelligence'
      - '--image=${_IMAGE}'
      - '--region=asia-southeast1'
      - '--no-cpu-throttling'
      - '--cpu-boost'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--startup-probe=failureThreshold=48,periodSeconds=5,timeoutSeconds=5,tcpSocket.port=8080'
      - '--liveness-probe=failureThreshold=3,periodSeconds=30,timeoutSeconds=5,httpGet.path=/health,httpGet.port=4444'
      - '--add-cloudsql-instances=${_CLOUDSQL}'
      - '--set-secrets=SHOPIFY_CLIENT_ID=shopify-client-id:latest,SHOPIFY_CLIENT_SECRET=shopify-client-secret:latest,AUTH_PASSWORD=mcp-auth-passphrase:latest,JWT_SECRET_KEY=mcp-jwt-secret:latest,GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest,CREDENTIALS_CONFIG=google-sheets-credentials:latest,DB_PASSWORD=db-password:latest,SHOPIFY_TOKEN_ENCRYPTION_KEY=shopify-token-encryption-key:latest,AUTH_ENCRYPTION_SECRET=auth-encryption-secret:latest'
      # Business config only — structural defaults are baked into image via config/defaults.env
      - '--set-env-vars=SHOPIFY_STORE=junlinleather-5148.myshopify.com,SHOPIFY_API_VERSION=2026-01,PLATFORM_ADMIN_EMAIL=admin@junlinleather.com,EXTERNAL_URL=fluid-intelligence-1056128102929.asia-southeast1.run.app,GOOGLE_ALLOWED_USERS=ourteam@junlinleather.com,CLOUDSQL_INSTANCE=junlinleather-mcp:asia-southeast1:contextforge,SSO_GOOGLE_ADMIN_DOMAINS=junlinleather.com,OTEL_SERVICE_NAME=fluid-intelligence,TRUST_PROXY_AUTH=true,TRUST_PROXY_AUTH_DANGEROUSLY=true,MCP_CLIENT_AUTH_ENABLED=false,AUTH_REQUIRED=false'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE: 'asia-southeast1-docker.pkg.dev/junlinleather-mcp/junlin-mcp/fluid-intelligence:latest'
  _CLOUDSQL: 'junlinleather-mcp:asia-southeast1:contextforge'
