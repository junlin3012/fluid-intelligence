steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'deploy/shopify-oauth/Dockerfile', '-t', '${_IMAGE}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'shopify-oauth'
      - '--image=${_IMAGE}'
      - '--region=asia-southeast1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--add-cloudsql-instances=junlinleather-mcp:asia-southeast1:contextforge'
      - '--set-secrets=SHOPIFY_CLIENT_ID=shopify-client-id:latest,SHOPIFY_CLIENT_SECRET=shopify-client-secret:latest,DB_PASSWORD=db-password:latest,SHOPIFY_TOKEN_ENCRYPTION_KEY=shopify-token-encryption-key:latest'
      - '--set-env-vars=DB_USER=contextforge,DB_NAME=contextforge,SHOPIFY_API_VERSION=2026-01,CALLBACK_URL=https://shopify-oauth-1056128102929.asia-southeast1.run.app/auth/callback,PYTHONUNBUFFERED=1'
      - '--allow-unauthenticated'

substitutions:
  _IMAGE: 'asia-southeast1-docker.pkg.dev/junlinleather-mcp/junlin-mcp/shopify-oauth:latest'
