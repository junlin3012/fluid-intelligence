query GetOrder($id: ID!) {
  order(id: $id) {
    id
    name
    createdAt
    updatedAt
    cancelledAt
    closedAt
    displayFulfillmentStatus
    displayFinancialStatus
    note
    tags
    totalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    currentSubtotalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalTaxSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    customer {
      id
      firstName
      lastName
    }
    shippingAddress {
      firstName
      lastName
      address1
      city
      province
      country
      zip
    }
    lineItems(first: 50) {
      edges {
        node {
          id
          title
          quantity
          originalTotalSet {
            shopMoney {
              amount
              currencyCode
            }
          }
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
