# mcp-config.yaml — Apollo MCP Server v1.9.0 configuration
# Docs: https://github.com/apollographql/apollo-mcp-server

endpoint: https://${SHOPIFY_STORE}/admin/api/${SHOPIFY_API_VERSION}/graphql.json

transport:
  type: sse
  port: 8000

schema:
  source: local
  path: /app/shopify-schema.graphql

operations:
  source: local
  paths:
    - /app/graphql/customers
    - /app/graphql/orders
    - /app/graphql/products
    - /app/graphql/inventory
    - /app/graphql/fulfillments
    - /app/graphql/metafields
    - /app/graphql/transfers

headers:
  X-Shopify-Access-Token: ${SHOPIFY_ACCESS_TOKEN}
